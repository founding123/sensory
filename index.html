<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>
<meta name="color-scheme" content="light dark">
<script>
  (function(){
    try{
      var key = 'sok-index-theme';
      var theme = localStorage.getItem(key) || '나이테';
      if (!/^(나이테|황혼|윤슬|쪽빛|미리내)$/.test(theme)) theme = '나이테';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = /^(쪽빛|미리내)$/.test(theme) ? 'dark' : 'light';
    }catch(e){
      document.documentElement.setAttribute('data-theme', '나이테');
    }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root,
  [data-theme="나이테"]{
    --hero-1:#fff8ec; --hero-2:#efe1c8; --hero-3:#d8c49d;
    --ground:#f5f0e6; --paper:#fffdf8;
    --ink:#202538; --muted:#6d7182; --line:#e6dccb;
    --gold:#9d6f1d; --gold-soft:#c88f2a; --gold-deep:#68430e;
    --blue:#356c9d;
    --hero-ink:#202538; --hero-text:#202538; --hero-sub:#606274;
    --hero-grid:rgba(104,67,14,.16); --hero-border:rgba(104,67,14,.32);
    --card-shadow:0 4px 14px rgba(80,61,30,.06);
    --card-shadow-hover:0 12px 26px rgba(80,61,30,.13);
    --go:#b1a48c; --empty-code:#f0e7d6;
    --switch-bg:rgba(255,253,248,.78); --switch-text:#6d7182;
    --maxw:1000px;
  }
  [data-theme="황혼"]{
    --hero-1:#fff2dc; --hero-2:#efb98c; --hero-3:#8f5f7a;
    --ground:#f5e7dc; --paper:#fffaf5;
    --ink:#2f2530; --muted:#796978; --line:#ead3c5;
    --gold:#a9462f; --gold-soft:#c85736; --gold-deep:#6f2f27;
    --blue:#7a6ea8;
    --hero-ink:#2f2530; --hero-text:#2f2530; --hero-sub:#4b3038;
    --hero-grid:rgba(111,47,39,.18); --hero-border:rgba(111,47,39,.34);
    --card-shadow:0 4px 14px rgba(112,73,52,.07);
    --card-shadow-hover:0 12px 26px rgba(112,73,52,.15);
    --go:#ad8a7a; --empty-code:#f2dccd;
    --switch-bg:rgba(255,250,245,.82); --switch-text:#796978;
  }
  [data-theme="윤슬"]{
    --hero-1:#f1fbff; --hero-2:#ccebf3; --hero-3:#99cfe0;
    --ground:#e4f4f8; --paper:#fbfdff;
    --ink:#1d2b38; --muted:#5f7686; --line:#c0dce9;
    --gold:#137f9f; --gold-soft:#0f6f93; --gold-deep:#075a78;
    --blue:#2877aa;
    --hero-ink:#1c2a35; --hero-text:#1c2a35; --hero-sub:#526d7d;
    --hero-grid:rgba(7,90,120,.17); --hero-border:rgba(7,90,120,.34);
    --card-shadow:0 4px 14px rgba(48,117,150,.07);
    --card-shadow-hover:0 12px 26px rgba(48,117,150,.14);
    --go:#82a4b5; --empty-code:#d8edf6;
    --switch-bg:rgba(251,253,255,.82); --switch-text:#5f7686;
  }
  [data-theme="쪽빛"]{
    --hero-1:#283f78; --hero-2:#182b5c; --hero-3:#101d42;
    --ground:#1f2e59; --paper:#2a3b6c;
    --ink:#edf4ff; --muted:#c0ccea; --line:rgba(174,198,255,.24);
    --gold:#a9c5ff; --gold-soft:#dce8ff; --gold-deep:#8fb0f6;
    --blue:#bfd3ff;
    --hero-ink:#f4f8ff; --hero-text:#edf4ff; --hero-sub:#cdd9f7;
    --hero-grid:rgba(174,198,255,.07); --hero-border:rgba(174,198,255,.22);
    --card-shadow:0 4px 18px rgba(0,0,0,.22);
    --card-shadow-hover:0 16px 34px rgba(0,0,0,.32);
    --go:#b8c9ef; --empty-code:rgba(255,255,255,.10);
    --switch-bg:rgba(19,32,70,.82); --switch-text:#c8d5f4;
  }
  [data-theme="미리내"]{
    --hero-1:#42345f; --hero-2:#2a2448; --hero-3:#1a1732;
    --ground:#26233b; --paper:#312b4d;
    --ink:#f2ecf7; --muted:#c2bbd2; --line:rgba(214,212,248,.20);
    --gold:#c9c8ff; --gold-soft:#efedff; --gold-deep:#aeb1f2;
    --blue:#c5b7ff;
    --hero-ink:#fff7ff; --hero-text:#f8effb; --hero-sub:#d7d0e8;
    --hero-grid:rgba(239,237,255,.065); --hero-border:rgba(239,237,255,.18);
    --card-shadow:0 4px 18px rgba(0,0,0,.24);
    --card-shadow-hover:0 16px 34px rgba(0,0,0,.34);
    --go:#9d96b8; --empty-code:rgba(255,255,255,.10);
    --switch-bg:rgba(34,29,54,.76); --switch-text:#d4cee5;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--ground);
    color:var(--ink);
    font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
    word-break:keep-all;
    transition:background .25s ease, color .25s ease;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}

  /* ---------- THEME PICKER ---------- */
  .theme-dock{
    position:fixed; top:34px; right:22px; z-index:1000;
    display:inline-flex; align-items:center; justify-content:flex-end;
    width:auto; max-width:calc(100% - 44px); margin:0;
  }
  .theme-picker{
    display:inline-flex; align-items:center; gap:4px; flex-wrap:wrap;
    width:auto; max-width:100%;
    background:var(--switch-bg); border:1px solid color-mix(in srgb, var(--gold) 35%, transparent); border-radius:999px;
    padding:4px; box-shadow:0 8px 22px rgba(0,0,0,.13); backdrop-filter:blur(10px);
  }
  .theme-picker button{
    border:0; background:transparent; color:var(--switch-text); cursor:pointer;
    font:700 12.5px/1 Pretendard,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    padding:8px 11px; border-radius:999px; transition:background .16s ease, color .16s ease, box-shadow .16s ease;
  }
  .theme-picker button:hover{color:var(--hero-ink)}
  .theme-picker button[aria-pressed="true"]{
    color:var(--hero-ink); background:color-mix(in srgb, var(--gold) 22%, transparent);
    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--gold) 68%, transparent);
  }
  .theme-picker button:focus-visible{outline:2px solid var(--gold-soft); outline-offset:2px}

  /* ---------- HERO ---------- */
  .hero{
    position:relative; overflow:hidden;
    background:radial-gradient(125% 120% at 50% -18%, var(--hero-1) 0%, var(--hero-2) 52%, var(--hero-3) 100%);
    color:var(--hero-text); padding:92px 22px 110px; text-align:center;
    border-bottom:1px solid var(--hero-border);
    transition:background .25s ease, color .25s ease, border-color .25s ease;
  }
  .hero::after{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(var(--hero-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--hero-grid) 1px, transparent 1px);
    background-size:48px 48px;
    -webkit-mask-image:radial-gradient(circle at 50% 32%, #000 0%, transparent 72%);
    mask-image:radial-gradient(circle at 50% 32%, #000 0%, transparent 72%);
    pointer-events:none;
  }
  .hero-inner{position:relative; z-index:2; max-width:760px; margin:0 auto}

  .mark{width:118px; height:118px; margin:0 auto 26px; display:block}
  .mark .ring-rot{transform-origin:60px 60px; animation:spin 26s linear infinite; stroke:var(--gold-deep)}
  .mark .draw{stroke-dasharray:1; stroke-dashoffset:1; animation:draw 1.1s ease forwards .15s; stroke:var(--gold-soft)}
  .mark .core{stroke:var(--gold-deep)}
  .mark .ray{stroke:var(--gold-soft)}
  .mark .pip{fill:var(--gold-deep)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes draw{to{stroke-dashoffset:0}}

  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-size:12px; font-weight:700; letter-spacing:.32em;
    color:var(--gold-deep); text-transform:uppercase; margin:0 0 22px;
  }
  [data-theme="쪽빛"] .eyebrow{color:var(--gold-soft)}
  .eyebrow .bar{width:26px; height:1px; background:linear-gradient(90deg,transparent,var(--gold))}
  .eyebrow .bar.r{background:linear-gradient(90deg,var(--gold),transparent)}

  .title{
    font-family:'Nanum Myeongjo',serif; font-weight:800;
    font-size:clamp(40px, 9vw, 78px); line-height:1.05; letter-spacing:-.01em;
    margin:0; color:var(--hero-ink); text-shadow:0 2px 30px rgba(0,0,0,.10);
  }
  [data-theme="쪽빛"] .title{text-shadow:0 2px 30px rgba(0,0,0,.25)}
  .title .pick{color:var(--gold-deep); position:relative; white-space:nowrap}
  [data-theme="쪽빛"] .title .pick{color:var(--gold-soft)}
  .title .pick::after{
    content:""; position:absolute; left:2%; right:2%; bottom:.06em; height:.09em;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:2px;
  }

  .tagline{margin:26px auto 0; max-width:30em; font-size:clamp(15px,2.4vw,18px); color:var(--hero-sub); letter-spacing:-.01em}
  .count-pill{
    display:inline-flex; align-items:center; gap:9px; margin-top:30px; padding:8px 16px;
    border:1px solid color-mix(in srgb, var(--gold) 40%, transparent); border-radius:999px; color:var(--gold-deep); font-size:13px; font-weight:600;
  }
  [data-theme="쪽빛"] .count-pill{color:var(--gold-soft)}
  .count-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--gold)}
  [data-theme="황혼"] .count-pill{
    border-color:rgba(111,47,39,.52);
    background:rgba(255,250,245,.18);
  }
  [data-theme="윤슬"] .count-pill{
    border-color:rgba(7,90,120,.50);
    background:rgba(251,253,255,.22);
  }
  [data-theme="나이테"] .count-pill{
    border-color:rgba(104,67,14,.50);
    background:rgba(255,253,248,.22);
  }
  [data-theme="나이테"] .mark .ring-rot{opacity:.72}
  [data-theme="나이테"] .mark .draw{opacity:.95}

  /* ---------- INDEX GRID ---------- */
  .sheet{max-width:var(--maxw); margin:0 auto; padding:54px 22px 30px}
  .sheet-head{
    display:flex; align-items:baseline; gap:14px; margin:0 0 26px; padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .sheet-head .label{font-size:13px; font-weight:700; letter-spacing:.22em; color:var(--gold-deep); text-transform:uppercase}
  .sheet-head .hint{font-size:13.5px; color:var(--muted)}

  .grid{display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:14px}
  @media (max-width:680px){ .grid{grid-template-columns:1fr} }

  .card{
    position:relative; display:flex; align-items:center; gap:18px;
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    padding:18px 20px; text-decoration:none; color:var(--ink);
    box-shadow:var(--card-shadow);
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .25s ease, color .25s ease;
  }
  .card .num{flex:0 0 auto; font-size:14px; font-weight:700; color:var(--muted); letter-spacing:.04em; transition:color .16s ease}
  .card .rule{flex:0 0 auto; width:1px; height:30px; background:var(--line); transition:background .16s ease}
  .card .name{flex:1 1 auto; font-size:16.5px; font-weight:600; letter-spacing:-.015em; line-height:1.35}
  .card .go{flex:0 0 auto; color:var(--go); font-size:19px; transition:transform .18s ease, color .16s ease}
  .card:hover{transform:translateY(-2px); border-color:var(--gold); box-shadow:var(--card-shadow-hover)}
  .card:hover .num{color:var(--gold-deep)}
  .card:hover .rule{background:var(--gold)}
  .card:hover .go{transform:translateX(4px); color:var(--gold-deep)}
  .card:focus-visible{outline:2px solid var(--blue); outline-offset:3px}

  .empty{
    grid-column:1 / -1; text-align:center; color:var(--muted);
    padding:46px 22px; background:var(--paper); border:1px dashed var(--line); border-radius:16px; font-size:15px;
  }
  .empty code{background:var(--empty-code); padding:2px 7px; border-radius:6px; color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:13px}

  /* ---------- FOOTER ---------- */
  .foot{max-width:var(--maxw); margin:0 auto; padding:34px 22px 60px; text-align:center; color:var(--muted)}
  .foot .fmark{width:30px; height:30px; margin:0 auto 12px; display:block; opacity:.72}
  .foot .fmark .line{stroke:var(--gold-deep)}
  .foot .fmark .pip{fill:var(--gold-deep)}
  .foot .sig{font-family:'Nanum Myeongjo',serif; font-weight:700; font-size:16px; color:var(--ink); letter-spacing:.02em}
  .foot .meta{font-size:12.5px; margin-top:5px}

  @media (max-width:560px){
    .theme-dock{top:18px; right:14px; left:14px; max-width:none; justify-content:flex-end}
    .theme-picker{border-radius:18px; justify-content:flex-end}
    .theme-picker button{padding:8px 10px}
    .hero{padding-top:108px}
  }

  @media (prefers-reduced-motion: reduce){
    .mark .ring-rot{animation:none}
    .mark .draw{animation:none; stroke-dashoffset:0}
    .card, body, .hero{transition:none}
  }

  /* ---------- INDEX LOCK: 잠금 전에는 hero의 입력 카드만 표시 ---------- */
  body[data-unlocked="false"] .locked-content{display:none!important}
  body[data-unlocked="true"] .unlock-card{display:none!important}
  body[data-unlocked="true"] .locked-content{display:block}
  .unlock-card{
    position:relative; z-index:3; max-width:420px; margin:0 auto;
    background:color-mix(in srgb, var(--paper) 90%, transparent);
    border:1px solid color-mix(in srgb, var(--gold) 42%, var(--hero-border)); border-radius:22px;
    padding:24px 22px 22px; box-shadow:0 18px 42px rgba(0,0,0,.14);
    backdrop-filter:blur(12px); text-align:left; color:var(--ink);
  }
  [data-theme="쪽빛"] .unlock-card,
  [data-theme="미리내"] .unlock-card{
    background:color-mix(in srgb, var(--paper) 86%, rgba(8,14,31,.72));
    box-shadow:0 18px 46px rgba(0,0,0,.30);
  }
  .unlock-card .lock-label{
    display:inline-flex; align-items:center; gap:8px; margin:0 0 12px;
    font-size:12px; font-weight:800; letter-spacing:.24em; text-transform:uppercase;
    color:var(--gold-deep);
  }
  [data-theme="쪽빛"] .unlock-card .lock-label,
  [data-theme="미리내"] .unlock-card .lock-label{color:var(--gold-soft)}
  .unlock-card h1{
    margin:0 0 8px; font-family:'Nanum Myeongjo',serif;
    font-size:clamp(25px,5vw,34px); line-height:1.15; color:var(--ink);
  }
  [data-theme="쪽빛"] .unlock-card h1,
  [data-theme="미리내"] .unlock-card h1{color:var(--hero-ink)}
  .unlock-card p{margin:0 0 16px; color:var(--muted); font-size:14px}
  [data-theme="쪽빛"] .unlock-card p,
  [data-theme="미리내"] .unlock-card p{color:var(--hero-sub)}
  .unlock-row{display:flex; gap:8px; align-items:center}
  .unlock-row input{
    flex:1 1 auto; min-width:0; border:1px solid var(--line); border-radius:12px;
    padding:12px 13px; background:color-mix(in srgb, var(--paper) 96%, white); color:var(--ink); font:inherit;
    outline:none; caret-color:var(--gold-deep);
  }
  [data-theme="쪽빛"] .unlock-row input,
  [data-theme="미리내"] .unlock-row input{
    background:color-mix(in srgb, var(--paper) 78%, #0d1634);
    border-color:color-mix(in srgb, var(--gold) 28%, var(--line));
    color:var(--ink);
  }
  .unlock-row input::placeholder{color:color-mix(in srgb, var(--muted) 76%, transparent)}
  .unlock-row input:focus{border-color:var(--gold); box-shadow:0 0 0 3px color-mix(in srgb, var(--gold) 20%, transparent)}
  .unlock-row button{
    flex:0 0 auto; border:0; border-radius:12px; padding:12px 15px;
    background:var(--gold-deep); color:var(--paper); font:800 14px/1 Pretendard,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif; cursor:pointer;
  }
  [data-theme="쪽빛"] .unlock-row button,
  [data-theme="미리내"] .unlock-row button{color:#142047}
  .unlock-row button:hover{background:var(--gold)}
  .unlock-msg{min-height:20px; margin-top:11px; font-size:13px; color:var(--muted)}
  [data-theme="쪽빛"] .unlock-msg,
  [data-theme="미리내"] .unlock-msg{color:var(--hero-sub)}
  @media (max-width:560px){
    .unlock-row{flex-direction:column}
    .unlock-row input,.unlock-row button{width:100%}
  }

</style>
</head>
<body data-lock-page="index" data-unlocked="false">

  <header class="hero">
    <div class="theme-dock" role="group" aria-label="테마 선택">
      <div class="theme-picker" id="themePicker">
        <button type="button" data-theme-choice="나이테" aria-pressed="true">나이테</button>
        <button type="button" data-theme-choice="황혼" aria-pressed="false">황혼</button>
        <button type="button" data-theme-choice="윤슬" aria-pressed="false">윤슬</button>
        <button type="button" data-theme-choice="쪽빛" aria-pressed="false">쪽빛</button>
        <button type="button" data-theme-choice="미리내" aria-pressed="false">미리내</button>
      </div>
    </div>

    <div class="hero-inner">
      <svg class="mark" viewBox="0 0 120 120" fill="none" aria-hidden="true">
        <circle class="ring-rot" cx="60" cy="60" r="52" stroke-width="1" stroke-dasharray="3 7" opacity=".55"/>

      <section class="unlock-card" aria-label="비밀번호 입력">

        <p>아직 이 세션은 사용 불가합니다.</p>
        <div class="unlock-row">
          <input id="indexPassphrase" type="password" autocomplete="off" placeholder="문자열 입력" aria-label="비밀번호">

        </div>
        <div class="unlock-msg" id="indexUnlockMsg" aria-live="polite"></div>
      </section>

      <div class="locked-content">
        <p class="eyebrow"><span class="bar"></span><span id="site-eyebrow"></span><span class="bar r"></span></p>

        <div class="count-pill"><span class="dot"></span><span class="mono" id="count">0 SETS</span></div>
      </div>
    </div>
  </header>

  <main class="sheet locked-content">
    <div class="sheet-head">
      <span class="label">Index</span>
      <span class="hint">주제를 골라 바로 풀어보세요.</span>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <footer class="foot locked-content">
    <svg class="fmark" viewBox="0 0 120 120" fill="none" aria-hidden="true">
      <circle class="line" cx="60" cy="60" r="40" stroke-width="2.5"/>
      <line class="line" x1="60" y1="8" x2="60" y2="30" stroke-width="2.5"/>
      <line class="line" x1="60" y1="90" x2="60" y2="112" stroke-width="2.5"/>
      <line class="line" x1="8" y1="60" x2="30" y2="60" stroke-width="2.5"/>
      <line class="line" x1="90" y1="60" x2="112" y2="60" stroke-width="2.5"/>
      <circle class="pip" cx="60" cy="60" r="7"/>
    </svg>
    <div class="sig" id="foot-title"></div>
    <div class="meta mono"><span id="foot-count">0</span> SETS · ORACLE</div>
  </footer>


  <script id="indexUnlockPayload" type="application/json">

  <!-- 페이지 목록은 pages.js 한 파일에서만 관리합니다 -->
  <script src="pages.js"></script>
  <script>
    (function () {
      var THEME_KEY = 'sok-index-theme';
      var THEMES = ['나이테', '황혼', '윤슬', '쪽빛', '미리내'];
      function validTheme(t){ return THEMES.indexOf(t) !== -1 ? t : '나이테'; }
      function applyTheme(t){
        t = validTheme(t);
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.colorScheme = /^(쪽빛|미리내)$/.test(t) ? 'dark' : 'light';
        var buttons = document.querySelectorAll('[data-theme-choice]');
        for (var i = 0; i < buttons.length; i++) {
          buttons[i].setAttribute('aria-pressed', String(buttons[i].getAttribute('data-theme-choice') === t));
        }
        try { localStorage.setItem(THEME_KEY, t); } catch(e) {}
      }
      var picker = document.getElementById('themePicker');
      if (picker) {
        picker.addEventListener('click', function(e){
          var btn = e.target.closest('[data-theme-choice]');
          if (!btn) return;
          applyTheme(btn.getAttribute('data-theme-choice'));
        });
      }
      try { applyTheme(validTheme(localStorage.getItem(THEME_KEY) || document.documentElement.getAttribute('data-theme'))); }
      catch(e) { applyTheme('나이테'); }
    })();

    (function () {
      function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
      function escAttr(s){ return esc(s).replace(/"/g, '&quot;'); }
      function fileToName(f){ return String(f).replace(/\.html?$/i, '').replace(/[_-]+/g, ' ').trim(); }
      function pad(n){ n = String(n); while (n.length < 4) n = '0' + n; return n; }

      var grid = document.getElementById('grid');
      var countEl = document.getElementById('count');
      var fc = document.getElementById('foot-count');
      if (!grid) return;

      var PAGE_NUMBERS = (window.PAGE_NUMBERS || []).slice().sort(function (a, b) { return a - b; });
      var buildSeq = 0;

      async function resolveEncryptedPageName(doc) {
        if (!window.SOK_LOCK || !window.SOK_LOCK.decryptStoredPayload) return '';
        var payloadEl = doc.getElementById('pageMetaPayload');
        if (!payloadEl) return '';
        try {
          var txt = await window.SOK_LOCK.decryptStoredPayload(JSON.parse(payloadEl.textContent));
          var meta = JSON.parse(txt);
          return (meta && meta.title) ? String(meta.title).trim() : '';
        } catch (e) {
          return '';
        }
      }

      async function readPage(num, unlocked) {
        var file = 'c' + pad(num) + '.html';
        try {
          var res = await fetch(file);
          if (!res.ok) return null;
          var txt = await res.text();
          var doc = new DOMParser().parseFromString(txt, 'text/html');
          var m = doc.querySelector('meta[name="page-title"]');
          var nm = (m && m.getAttribute('content')) ? m.getAttribute('content').trim() : '';
          if (!nm && unlocked) nm = await resolveEncryptedPageName(doc);
          if (!nm) { var h = doc.querySelector('h1'); if (h) nm = h.textContent.trim(); }
          return { n: num, file: file, name: nm || fileToName(file) };
        } catch (e) {
          return null;
        }
      }

      async function buildGrid(unlocked) {
        var seq = ++buildSeq;
        grid.innerHTML = '<div class="empty">신탁 받는 중...</div>';
        var tasks = PAGE_NUMBERS.map(function (n) { return readPage(n, !!unlocked); });
        var results = await Promise.all(tasks);
        if (seq !== buildSeq) return;

        var pages = results.filter(Boolean).sort(function (a, b) { return a.n - b.n; });
        if (countEl) countEl.textContent = pages.length + ' SETS';
        if (fc) fc.textContent = pages.length;
        if (!pages.length) {
          grid.innerHTML = '<div class="empty"><code>cNN.html</code>(예: <code>c01.html</code>) 이름으로 파일을 올리고, 그 안에 <code>&lt;meta name="page-title" content="..."&gt;</code> 또는 암호화된 페이지 제목을 넣으면 여기에 자동으로 나타납니다.</div>';
          return;
        }
        var html = '';
        pages.forEach(function (p, idx) {
          html += '<a class="card" href="' + escAttr(p.file) + '">' +
                    '<span class="num mono">' + pad(idx + 1) + '</span><span class="rule"></span>' +
                    '<span class="name">' + esc(p.name) + '</span><span class="go">→</span>' +
                  '</a>';
        });
        grid.innerHTML = html;
      }

      window.addEventListener('sok:index-unlocked', function () { buildGrid(true); });
      buildGrid(false);
    })();
  </script>
  <script src="assets/unlock.js"></script>

</body>
</html>
