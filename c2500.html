  }

      var shell = root.querySelector('.sim-shell');

const MUSCLES = {
  MR:{name:'내직근',lat:'Medial rectus',   nerve:'눈돌림신경 (CN III)',
      acts:[['주작용','안쪽돌림','add']],
      action:{elev:0,   add: 40, intor:0}},
  LR:{name:'외직근',lat:'Lateral rectus',  nerve:'갓돌림신경 (CN VI)',
      acts:[['주작용','가쪽돌림','add']],
      action:{elev:0,   add:-40, intor:0}},
  SR:{name:'상직근',lat:'Superior rectus', nerve:'눈돌림신경 (CN III)',
      acts:[['주작용','올림','elev'],['보조작용','내회선','tor'],['3차작용','안쪽돌림','add']],
      action:{elev: 35, add:  8, intor: 15}},
  IR:{name:'하직근',lat:'Inferior rectus', nerve:'눈돌림신경 (CN III)',

/* ── 근육 경로 정의 (origin/경유점 고정, insertion은 안구와 함께 회전) ──
   SR·IR은 안와축이 시축과 ~23° 이루므로 코쪽-뒤(posteromedial)에서
   비스듬히 다가오도록 기시부를 코쪽(+X)으로 배치 → 보조작용(회선·내전)의 기하 근거. */
function V(x,y,z){return new THREE.Vector3(x,y,z);}
function nrm(v,r){return v.clone().normalize().multiplyScalar(r);}
const APEX = V(0.10,0,-1.9);
const TROCHLEA = V(0.72,1.18,0.98);     // 도르래 위치 (앞·위·코쪽 안와연)
const IO_ORIGIN = V(0.95,-0.95,0.98);   // 하사근 뼈 기시부 (안와바닥·코쪽 앞)
const PATHS = {
  MR:{fixed:[V(0.45,0,-1.9), V(1.12,0,-0.10)], ins:nrm(V(0.85,0,0.52),R)},
  LR:{fixed:[V(-0.25,0,-1.9),V(-1.12,0,-0.10)],ins:nrm(V(-0.85,0,0.52),R)},
  /* 상직근: 코쪽-뒤 기시 → 위로 비스듬히 → 상부 정지 */
  SR:{fixed:[V(0.66,0.30,-1.85), V(0.30,1.10,-0.10)], ins:nrm(V(0,0.85,0.52),R)},
  /* 하직근: 코쪽-뒤 기시 → 아래로 비스듬히 → 하부 정지 */
  IR:{fixed:[V(0.66,-0.30,-1.85),V(0.30,-1.10,-0.10)],ins:nrm(V(0,-0.85,0.52),R)},
  /* 상사근: 안와정점 → 도르래(앞·위·코쪽)에서 꺾임 → 안구 위로 후상측두에 정지 */
  SO:{fixed:[APEX.clone(), TROCHLEA.clone(), V(0.10,1.00,0.05)], ins:nrm(V(-0.45,0.62,-0.55),R)},
  /* 하사근: 뼈 기시부(앞·아래·코쪽) → 안구 아래로 → 후하측두에 정지 (도르래 없음) */
  IO:{fixed:[IO_ORIGIN.clone(), V(0.00,-1.05,-0.05)], ins:nrm(V(-0.45,-0.55,-0.55),R)},
};

/* ── 근섬유 횡문(가로 줄무늬) 텍스처: 길이축을 따라 반복되는 띠 ── */
function makeStriae(){
  const c=document.createElement('canvas'); c.width=64; c.height=16;
  const x=c.getContext('2d');
  for(let i=0;i<64;i++){
    const t=(Math.sin(i/64*Math.PI*2*4)+1)/2;        // 4개 띠가 매끄럽게 타일링
    const r=Math.round(150+ (226-150)*t);
    const g=Math.round( 45+ ( 80- 45)*t);
    const b=Math.round( 40+ ( 74- 40)*t);
    x.fillStyle=`rgb(${r},${g},${b})`;
    x.fillRect(i,0,1,16);
    if(i%16===0){ x.fillStyle='rgba(70,18,16,0.9)'; x.fillRect(i,0,1.4,16); } // 띠 경계선
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}
const striae = makeStriae();
const muscleMat = new THREE.MeshStandardMaterial({
  color:0xffffff, map:striae, roughness:.5, metalness:.05,
  emissive:0x3a0f0d, emissiveIntensity:.3});
let muscleMesh = null;
const insMarker = new THREE.Mesh(new THREE.SphereGeometry(0.075,16,16),
  new THREE.MeshBasicMaterial({color:0xff8b84}));
scene.add(insMarker);

/* ── 도르래(SO) / 뼈 기시부(IO) ── */
const boneMat = new THREE.MeshStandardMaterial({color:0xd2dae1, roughness:.65, metalness:.04,
  emissive:0x1a2632, emissiveIntensity:.15});
const trochlea = new THREE.Mesh(new THREE.TorusGeometry(0.18,0.05,14,28), boneMat);
trochlea.position.copy(TROCHLEA);
trochlea.quaternion.setFromUnitVectors(V(0,0,1), TROCHLEA.clone().sub(APEX).normalize());
trochlea.visible=false; scene.add(trochlea);

const ioOriginMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.16,0.16), boneMat);
ioOriginMesh.position.copy(IO_ORIGIN);
ioOriginMesh.visible=false; scene.add(ioOriginMesh);

/* ── 텍스트 라벨 (스프라이트, 항상 카메라 향함) ── */
function makeLabel(text){
  const fs=46, pad=14, font=`700 ${fs}px -apple-system,"Noto Sans KR",sans-serif`;
  const m=document.createElement('canvas').getContext('2d'); m.font=font;
  const w=Math.ceil(m.measureText(text).width)+pad*2, h=fs+pad*2;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d'); x.font=font; x.textBaseline='middle';
  x.fillStyle='rgba(18,24,31,0.9)';
  const rr=12; x.beginPath();
  x.moveTo(rr,0); x.arcTo(w,0,w,h,rr); x.arcTo(w,h,0,h,rr); x.arcTo(0,h,0,0,rr); x.arcTo(0,0,w,0,rr); x.fill();
  x.strokeStyle='rgba(210,218,225,0.5)'; x.lineWidth=2; x.stroke();
  x.fillStyle='#eaf0f5'; x.fillText(text,pad,h/2+1);
  const tex=new THREE.CanvasTexture(c);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.renderOrder=999; sp.scale.set(w*0.0042,h*0.0042,1); sp.visible=false;
  scene.add(sp); return sp;
}
const trochleaLabel = makeLabel('도르래 (trochlea)');
trochleaLabel.position.copy(TROCHLEA).add(V(0,0.34,0));
const ioLabel = makeLabel('기시부 · 안와바닥 (도르래 없음)');
ioLabel.position.copy(IO_ORIGIN).add(V(0,-0.36,0));

function updateExtras(){
  const isSO = current==='SO', isIO = current==='IO';
  trochlea.visible = trochleaLabel.visible = isSO;
  ioOriginMesh.visible = ioLabel.visible = isIO;
}

function rebuildMuscle(){
  const p = PATHS[current];
  const insNow = p.ins.clone().applyQuaternion(globe.quaternion);
  const pts = [...p.fixed.map(v=>v.clone()), insNow];
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
  const radius = 0.085*(1+0.42*contraction);          // 수축 시 근복 두꺼워짐
  const geo = new THREE.TubeGeometry(curve, 64, radius, 12, false);
  if(muscleMesh){ muscleMesh.geometry.dispose(); muscleMesh.geometry = geo; }
  else { muscleMesh = new THREE.Mesh(geo, muscleMat); scene.add(muscleMesh); }
  /* 줄무늬: 수축할수록 띠가 촘촘해지고 기시부 쪽으로 미끄러짐 → 수축 가시화 */
  striae.repeat.set(14*(1+0.7*contraction), 1);
  striae.offset.x = -contraction*1.4;
  insMarker.position.copy(insNow);
}

/* ── 수축률 → 목표 회전 (지수사상: 회전벡터 = 축*각) ──
   scene 회전벡터 = (−elev, +add, −intor)  (도→라디안) */
const tmpQ = new THREE.Quaternion();
const tmpAxis = new THREE.Vector3();
function targetQuat(out){
  const a = MUSCLES[current].action;
  const rx = -a.elev * contraction * Math.PI/180;
  const ry =  a.add  * contraction * Math.PI/180;
  const rz = -a.intor* contraction * Math.PI/180;
  tmpAxis.set(rx,ry,rz);
  const ang = tmpAxis.length();
  if(ang < 1e-6){ out.identity(); return; }
  tmpAxis.normalize();
  out.setFromAxisAngle(tmpAxis, ang);
}
const goalQuat = new THREE.Quaternion();

/* ── 리사이즈 ── */
function resize3D(){
  const r = glCanvas.getBoundingClientRect();
  const w = Math.max(1,r.width), h = Math.max(1,r.height);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(w,h,false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}

/* ── 마우스/터치 오빗 ── */
let dragging=false, lx=0, ly=0;
function down(x,y){dragging=true;lx=x;ly=y;}
function move(x,y){
  if(!dragging)return;
  camTheta -= (x-lx)*0.008;
  camPhi   -= (y-ly)*0.008;
  camPhi = Math.max(0.25, Math.min(Math.PI-0.25, camPhi));
  lx=x;ly=y; updateCam();
}
function up(){dragging=false;}
glCanvas.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
window.addEventListener('mouseup',up);
glCanvas.addEventListener('touchstart',e=>{const t=e.touches[0];down(t.clientX,t.clientY);},{passive:true});
glCanvas.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
glCanvas.addEventListener('touchend',up);
glCanvas.addEventListener('wheel',e=>{e.preventDefault();camR*=(1+Math.sign(e.deltaY)*0.08);camR=Math.max(3.4,Math.min(9,camR));updateCam();},{passive:false});

/* ============================================================
   2D 단면 캔버스
   ============================================================ */
function setupCanvas(cv){
  const dpr = Math.min(devicePixelRatio,2);
  const s = cv.clientWidth || 220;
  cv.width = s*dpr; cv.height = s*dpr;
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx, s};
}
const COL = {
  bg:'#101820', sclera:'#e9ecec', line:'#33414e', faint:'#46586a',
  iris:'#4a6b86', pupil:'#0a0d11', mark:'#ffd36b', label:'#7d8 d9a'
};
function label(ctx,t,x,y){
  ctx.fillStyle='#5c6b78'; ctx.font='600 11px '+getMono(); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t,x,y);
}
function getMono(){return 'ui-monospace,SFMono-Regular,Menlo,monospace';}

function eyeBase(ctx,cx,cy,r){
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#e9ecec'; ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle='#33414e'; ctx.stroke();
}
function gazeArrow(ctx,cx,cy,r,ang,color){
  // ang(rad): 0 = 화면 아래(+y)에서 시작하도록 호출부에서 보정
  const tx = cx + r*Math.sin(ang);
  const ty = cy + r*Math.cos(ang);
  // 시선 축
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty);
  ctx.lineWidth=3; ctx.strokeStyle=color; ctx.lineCap='round'; ctx.stroke();
  // 각막(끝부분 동그라미)
  ctx.beginPath(); ctx.arc(tx,ty, r*0.20, 0, Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
  ctx.beginPath(); ctx.arc(tx,ty, r*0.085, 0, Math.PI*2);
  ctx.fillStyle='#0a0d11'; ctx.fill();
}

/* 수평면(위에서): 뒤=위, 앞=아래, 코=오른쪽, 귀=왼쪽 / 안쪽·가쪽돌림 */
function drawAxial(addDeg){
  const cv=root.getElementById('cAxial'); const {ctx,s}=setupCanvas(cv);
  ctx.clearRect(0,0,s,s);
  const cx=s/2, cy=s/2, r=s*0.34;
  eyeBase(ctx,cx,cy,r);
  // 시선: rest = 아래(앞). +add → 오른쪽(코)
  const ang = addDeg*Math.PI/180;          // sin→x(오른쪽), cos→y(아래)
  gazeArrow(ctx,cx,cy,r*0.92,ang,'#5fb3f0');
  label(ctx,'뒤',cx,cy-r-13);
  label(ctx,'앞',cx,cy+r+13);
  label(ctx,'코',cx+r+13,cy);
  label(ctx,'귀',cx-r-13,cy);
}
/* 시상면(옆에서): 위=위, 아래=아래, 앞=왼쪽, 뒤=오른쪽 / 올림·내림 */
function drawSag(elevDeg){
  const cv=root.getElementById('cSag'); const {ctx,s}=setupCanvas(cv);
  ctx.clearRect(0,0,s,s);
  const cx=s/2, cy=s/2, r=s*0.34;
  eyeBase(ctx,cx,cy,r);
  // rest = 왼쪽(앞). +elev → 위
  const phi = elevDeg*Math.PI/180;
  const L=r*0.92;
  const tx = cx - L*Math.cos(phi);
  const ty = cy - L*Math.sin(phi);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty);
  ctx.lineWidth=3; ctx.strokeStyle='#7fd06a'; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(tx,ty,r*0.20,0,Math.PI*2); ctx.fillStyle='#7fd06a'; ctx.fill();
  ctx.beginPath(); ctx.arc(tx,ty,r*0.085,0,Math.PI*2); ctx.fillStyle='#0a0d11'; ctx.fill();
  label(ctx,'위',cx,cy-r-13);
  label(ctx,'아래',cx,cy+r+13);
  label(ctx,'앞',cx-r-13,cy);
  label(ctx,'뒤',cx+r+13,cy);
}
/* 관상면(앞에서): 위=위, 아래=아래, 코=오른쪽, 귀=왼쪽 / 내·외회선 */
function drawCor(intorDeg){
  const cv=root.getElementById('cCor'); const {ctx,s}=setupCanvas(cv);
  ctx.clearRect(0,0,s,s);
  const cx=s/2, cy=s/2, r=s*0.34;
  eyeBase(ctx,cx,cy,r);
  // 홍채
  ctx.beginPath(); ctx.arc(cx,cy,r*0.62,0,Math.PI*2); ctx.fillStyle='#4a6b86'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r*0.24,0,Math.PI*2); ctx.fillStyle='#0a0d11'; ctx.fill();
  // 기준 수직선(점선)
  ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(cx,cy-r*0.82); ctx.lineTo(cx,cy+r*0.82);
  ctx.lineWidth=1; ctx.strokeStyle='#46586a'; ctx.stroke(); ctx.setLineDash([]);
  // 12시 표지: rest=위, +intor → 오른쪽(코)으로 굴림
  const psi = intorDeg*Math.PI/180;
  const mx = cx + r*0.82*Math.sin(psi);
  const my = cy - r*0.82*Math.cos(psi);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(mx,my);
  ctx.lineWidth=3.5; ctx.strokeStyle='#c79bf0'; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(mx,my,r*0.10,0,Math.PI*2); ctx.fillStyle='#ffd36b'; ctx.fill();
  label(ctx,'위',cx,cy-r-13);
  label(ctx,'아래',cx,cy+r+13);
  label(ctx,'코',cx+r+13,cy);
  label(ctx,'귀',cx-r-13,cy);
}

/* 단면 readout 텍스트 */
function setReadout(dirId,degId,val,posWord,negWord,color){
  const dir=root.getElementById(dirId), deg=root.getElementById(degId);
  const a=Math.abs(val);
  if(a<0.05){ dir.textContent='중립'; dir.className='dir neutral'; deg.textContent='0.0°'; deg.style.color=''; return; }
  dir.className='dir';
  dir.textContent = val>0 ? posWord : negWord;
  dir.style.color = color;
  deg.textContent = a.toFixed(1)+'°';
}

/* ============================================================
   렌더 루프
   ============================================================ */
function updateSections(){
  const a=MUSCLES[current].action;
  const elev=a.elev*contraction, add=a.add*contraction, intor=a.intor*contraction;
  drawAxial(add); drawSag(elev); drawCor(intor);
  setReadout('dAxial','gAxial',add,'안쪽돌림','가쪽돌림','#5fb3f0');
  setReadout('dSag','gSag',elev,'올림','내림','#7fd06a');
  setReadout('dCor','gCor',intor,'내회선','외회선','#c79bf0');
}

function loop(){
  requestAnimationFrame(loop);
  targetQuat(goalQuat);
  globe.quaternion.slerp(goalQuat, 0.18);   // 부드럽게
  rebuildMuscle();
  renderer.render(scene,camera);
}

/* ============================================================
   UI 바인딩
   ============================================================ */
const slider=root.getElementById('slider');
const pctOut=root.getElementById('pctOut');

function renderInfo(){
  const m=MUSCLES[current];
  root.getElementById('mName').textContent=m.name;
  root.getElementById('mLat').textContent='/ '+m.lat;
  root.getElementById('mNerve').textContent=m.nerve;
  const wrap=root.getElementById('mActions'); wrap.innerHTML='';
  m.acts.forEach(([rank,nm,axis],i)=>{
    const row=document.createElement('div');
    row.className='act '+(i===0?'primary':'sec');
    row.innerHTML=`<span class="dot" style="background:${AXCOLOR[axis]}"></span>
      <span class="rank">${rank}</span><span class="nm">${nm}</span>`;
    wrap.appendChild(row);
  });
}

function selectMuscle(k){
  current=k;
  contraction=0;
  slider.value=0; pctOut.textContent='0%';
  slider.style.setProperty('--fill','0%');
  goalQuat.identity();
  globe.quaternion.identity();   // 즉시 초기 위치
  root.querySelectorAll('button.m').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
  renderInfo();
  updateExtras();
  rebuildMuscle();
  updateSections();
}

root.querySelectorAll('button.m').forEach(b=>{
  b.addEventListener('click',()=>selectMuscle(b.dataset.k));
});
slider.addEventListener('input',()=>{
  contraction=slider.value/100;
  pctOut.textContent=slider.value+'%';
  slider.style.setProperty('--fill',slider.value+'%');
  updateSections();
});
root.getElementById('resetBtn').addEventListener('click',()=>{
  contraction=0; slider.value=0; pctOut.textContent='0%';
  slider.style.setProperty('--fill','0%'); goalQuat.identity(); updateSections();
});

window.addEventListener('resize',()=>{resize3D(); updateSections();});


if('ResizeObserver' in window){
  const ro = new ResizeObserver(()=>{ resize3D(); updateSections(); });
  ro.observe(host);
  ro.observe(glCanvas);
}

/* 시작 */
resize3D();
selectMuscle('SR');
updateSections();
loop();
  }

  function bootEomSims(){
    document.querySelectorAll('[data-eom-sim-host]').forEach(initEomSim);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bootEomSims, {once:true});
  } else {
    bootEomSims();
  }

  var target = document.getElementById('decryptedContent') || document.body;
  new MutationObserver(bootEomSims).observe(target, {childList:true, subtree:true});
})();
</script>
